name: Contact Form Tests

on:
  pull_request:
    paths:
      - 'contactPage/**'
      - '.github/workflows/**'

jobs:
  test-contact-form:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Start contact server in TEST_MODE
        run: |
          TEST_MODE=true nohup node contactPage/server.js > server.log 2>&1 & echo $! > server.pid

      - name: Wait for server
        run: |
          echo "Waiting for server to start..."
          for i in {1..10}; do
            if curl -sSf http://localhost:4000/ >/dev/null 2>&1; then
              echo "Server is up"; break
            fi
            sleep 1
          done

      - name: Run valid submission test
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST -d "name=Alice&email=alice@example.com&message=Hello+from+CI" http://localhost:4000/send-email)
          echo "Valid submission returned HTTP $status"
          if [ "$status" != "200" ]; then
            echo "=== server.log ==="
            cat server.log || true
            exit 1
          fi

      - name: Run invalid submission test (literal 'undefined')
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST -d "name=undefined&email=undefined&message=undefined" http://localhost:4000/send-email)
          echo "Invalid submission returned HTTP $status"
          if [ "$status" != "400" ]; then
            echo "Expected 400 for invalid payload; dumping server.log"
            cat server.log || true
            exit 1
          fi

      - name: Collect server logs
        if: always()
        run: |
          echo "=== server.log (last 200 lines) ==="
          tail -n 200 server.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
