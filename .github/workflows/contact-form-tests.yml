name: Contact Form Tests

on:
  pull_request:
    paths:
      - 'contactPage/**'
      - '.github/workflows/**'

jobs:
  test-contact-form:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Start local send-email wrapper (TEST_MODE)
        env:
          EMAILJS_SERVICE_ID: placeholder
          EMAILJS_TEMPLATE_ID: placeholder
          EMAILJS_USER_ID: placeholder
          TEST_MODE: 'true'
        run: |
          nohup node scripts/run-send-email-server.js > server.log 2>&1 & echo $! > server.pid

      - name: Wait for wrapper
        run: |
          echo "Waiting for wrapper to start..."
          for i in {1..10}; do
            if curl -sSf http://localhost:4000/api/send-email >/dev/null 2>&1; then
              echo "Wrapper is up"; break
            fi
            sleep 1
          done || true

      - name: Run valid submission test
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -d '{"name":"Alice","email":"alice@example.com","message":"Hello from CI","honeypot":""}' http://localhost:4000/api/send-email)
          echo "Valid submission returned HTTP $status"
          if [ "$status" != "200" ]; then
            echo "=== server.log ==="
            cat server.log || true
            exit 1
          fi

      - name: Run invalid submission test (literal 'undefined')
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -d '{"name":"undefined","email":"undefined","message":"undefined","honeypot":""}' http://localhost:4000/api/send-email)
          echo "Invalid submission returned HTTP $status"
          if [ "$status" != "400" ]; then
            echo "Expected 400 for invalid payload; dumping server.log"
            cat server.log || true
            exit 1
          fi

      - name: Collect server logs
        if: always()
        run: |
          echo "=== server.log (last 200 lines) ==="
          tail -n 200 server.log || true

      - name: Stop wrapper
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
