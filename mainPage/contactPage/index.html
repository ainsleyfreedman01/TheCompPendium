<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The CompPendium | Contact Us</title>
    <link rel="stylesheet" href="/contactPage/style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css"
        integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <link rel="icon" href="/images/logoOfficial.png" type="image/png">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #successMessage {
            display: none;
            font-size: 1rem;
            font-weight: 600;
            color: #059669;
            background: linear-gradient(135deg, #d1fae5, #ecfdf5);
            border: 1px solid #10b981;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-light py-3">
        <a href="/"><img class="logo" src="/images/logo.png"></a>
        <button class="navbar-toggler border-0" type="button" id="navbar-toggler">
            <div class="navbar-icon"></div>
        </button>
    </nav>

    <div class="offcanvas-collapse" id="offcanvasMenu" data-bs-scroll="false">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
                 <a class="nav-link" href="/aboutPage/">About Us</a>
            </li>
            <li class="nav-item active">
                 <a class="nav-link" href="/contactPage/">Contact Us<span
                        class="sr-only">(current)</span></a>
            </li>
        </ul>
    </div>

    <div class="jumbotron jumbotron-fluid py-6"
        style="background: url('/images/ContactUsBackground.webp') no-repeat; 
                background-size: cover; background-position: center; box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.25);">
        <div class="jumbotron-container text-center">
            <h1 class="display-4 text-white jumbotron-header">Contact Us</h1>
            <p class="text-white jumbotron-text display-5">Feel free to reach out with any questions, comments, or
                requests for future posts!</p>
        </div>
    </div>

    <div class="feedback-container">
        <div class="feedback-form">
            <h2>Send Us Your Feedback</h2>
            <form id="feedbackForm" action="/api/send-email" method="POST">
                <!-- Honeypot field to detect bots: hidden from users but may be filled by bots -->
                <input type="text" name="honeypot" style="display:none" tabindex="-1" autocomplete="off">

                <label for="name">Name:</label>
                <input type="text" name="name" required>

                <label for="email">Email:</label>
                <input type="email" name="email" required>

                <label for="message">Message:</label>
                <textarea name="message" rows="5" required></textarea>

                <button type="submit">Send Feedback</button>
            </form>

            <p id="successMessage">Email sent successfully!</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-left">
        <p>&copy; <span id="year"></span> The CompPendium</p>
        <div class="link-container">
            <ul>
                <li><a href="/">Home</a></li>
                    <li><a href="/">Home</a></li>
                    <li><a href="/aboutPage/">About Us</a></li>
                    <li><a href="/contactPage/">Contact Us</a></li>
            </ul>
        </div>
    </footer>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            // Use browser validation before sending
            if (!this.checkValidity()) { this.reportValidity(); return; }

            const form = new FormData(this);
            const payload = {
                name: form.get('name'),
                email: form.get('email'),
                message: form.get('message'),
                honeypot: form.get('honeypot') || ''
            };

            try {
                const res = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = await res.text();
                if (res.ok && text.includes('Message has been sent')) {
                    this.reset();
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    console.error('Failed to send email', res.status, text);
                }
            } catch (err) {
                console.error('Network error sending contact form', err);
            }
        });

        $(document).ready(function () {
            $('#navbar-toggler').on('click', function () {
                $('#offcanvasMenu').toggleClass('open');
                $('.navbar-icon').toggleClass('open');
            });
        });

        window.addEventListener('scroll', function () {
            // Get the scroll position
            let scrollPosition = window.scrollY + window.innerHeight;

            // Get the total scrollable height of the page
            let pageHeight = document.documentElement.scrollHeight;

            // If the user has reached the bottom of the page
            if (scrollPosition >= pageHeight) {
                // Lock the scroll position
                window.scrollTo(0, pageHeight - window.innerHeight);
            }
        });

        document.getElementById("year").innerHTML = new Date().getFullYear();

        window.addEventListener('load', function () {
            document.body.style.visibility = 'visible';
        });
    </script>
</body>

</html>
